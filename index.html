<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/StarNode_main.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StarNode – Connect. Compete. Conquer the Stars.</title>
    <meta name="description" content="The Premier sci-fi TCG now on Solana! Join the ultimate blockchain gaming experience with StarNode." />
    <meta name="theme-color" content="#0a0a0f" />

    <!-- Open Graph / social cards -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="StarNode – Connect. Compete. Conquer the Stars." />
    <meta property="og:description" content="The Premier sci-fi TCG now on Solana! Join the ultimate blockchain gaming experience with StarNode." />
    <meta property="og:image" content="/images/StarNode_main_logo_Graphic_02_not_animated-1.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="StarNode – Connect. Compete. Conquer the Stars." />
    <meta name="twitter:description" content="The Premier sci-fi TCG now on Solana." />
    <meta name="twitter:image" content="/images/StarNode_main_logo_Graphic_02_not_animated-1.png" />

    <!-- Preload critical fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Preload the above-the-fold hero logo -->
    <link rel="preload" as="image" href="/images/StarNode-main-logo-revised-final-1.png">

    <style>
      /* Critical CSS for initial load */
      body {
        margin: 0;
        padding: 0;
        background: #0a0a0f;
        overflow-x: hidden;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Loading animation */
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(0, 212, 255, 0.3);
        border-top: 3px solid #00d4ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen">
        <div class="loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
